<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Sistemas de Informação Geográfica 2</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6f8;--surface:#ffffff;--surface2:#f0f2f5;--surface3:#e5e8ee;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#18191c;--text2:#4b4d5c;--text3:#9a9baa;
  --accent:#1a56db;--accent-dim:rgba(26,86,219,0.09);--accent-dim2:rgba(26,86,219,0.17);
  --green:#166534;--green-dim:rgba(22,101,52,0.09);--green-dim2:rgba(22,101,52,0.17);
  --red:#991b1b;--red-dim:rgba(153,27,27,0.09);--red-dim2:rgba(153,27,27,0.17);
  --r:10px;--r2:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* HERO */
.hero{background:linear-gradient(135deg,#1e3a8a 0%,#1a56db 100%);padding:2.5rem 2rem 2rem;position:relative;overflow:hidden;}
.hero::after{content:'SIG';font-family:'Syne',sans-serif;font-size:180px;font-weight:800;color:rgba(255,255,255,0.05);position:absolute;right:-20px;bottom:-40px;line-height:1;pointer-events:none;}
.hero-inner{max-width:900px;margin:0 auto;position:relative;}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(22px,5vw,38px);font-weight:800;color:#fff;line-height:1.15;letter-spacing:-1px;margin-bottom:.5rem;}
.hero p{font-size:14px;color:rgba(255,255,255,0.7);line-height:1.65;max-width:480px;}
.hero-stats{display:flex;gap:2rem;margin-top:1.75rem;flex-wrap:wrap;}
.h-stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;color:#fff;}
.h-stat-lbl{font-size:11px;color:rgba(255,255,255,0.55);margin-top:1px;}

/* TABS */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:100;}
.tabs-inner{max-width:900px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none;}
.tabs-inner::-webkit-scrollbar{display:none}
.tab{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;padding:13px 15px;cursor:pointer;white-space:nowrap;transition:color .18s,border-color .18s;flex-shrink:0;}
.tab:hover:not(.on){color:var(--text2);}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);}

/* SCOREBOARD */
.sb{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 2rem;}
.sb-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;}
.sb-chip{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sb-dot.g{background:#16a34a;}.sb-dot.r{background:#dc2626;}.sb-dot.w{background:#9ca3af;}
.sb-chip strong{color:var(--text);}
.sb-prog{flex:1;min-width:120px;}
.sb-lbl{font-size:11px;color:var(--text3);margin-bottom:3px;font-family:'JetBrains Mono',monospace;}
.sb-track{height:4px;background:var(--surface3);border-radius:999px;overflow:hidden;}
.sb-fill{height:100%;border-radius:999px;background:var(--accent);transition:width .45s ease;}
.sb-reset{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;color:var(--text3);background:none;border:1px solid var(--border2);border-radius:6px;padding:5px 12px;cursor:pointer;transition:color .18s,border-color .18s;margin-left:auto;}
.sb-reset:hover{color:var(--red);border-color:var(--red);}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:1.75rem 2rem;}

/* RESULT */
.result{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:2.25rem;margin-bottom:1.75rem;text-align:center;}
.result.on{display:block;animation:up .35s ease;}
.res-num{font-family:'Syne',sans-serif;font-size:68px;font-weight:800;line-height:1;color:var(--accent);}
.res-num sub{font-size:30px;color:var(--text3);}
.res-sub{font-size:12px;color:var(--text2);margin-top:4px;margin-bottom:1.25rem;}
.res-track{background:var(--surface3);border-radius:999px;height:8px;max-width:300px;margin:0 auto 1.25rem;overflow:hidden;}
.res-bar{height:100%;border-radius:999px;background:var(--accent);transition:width 1s ease;}
.res-pills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:1.25rem;}
.pill{font-size:12px;font-weight:500;padding:5px 14px;border-radius:999px;}
.pill.g{background:var(--green-dim);color:var(--green);}
.pill.r{background:var(--red-dim);color:var(--red);}
.res-msg{font-size:14px;color:var(--text2);line-height:1.6;max-width:420px;margin:0 auto 1.5rem;}
.retry{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px 26px;cursor:pointer;letter-spacing:.02em;transition:opacity .18s;}
.retry:hover{opacity:.85;}

/* QUESTION CARD */
.qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:1.1rem;overflow:hidden;animation:up .28s ease both;}
.qc:nth-child(2){animation-delay:.03s}.qc:nth-child(3){animation-delay:.06s}.qc:nth-child(4){animation-delay:.09s}
.qc:nth-child(5){animation-delay:.12s}.qc:nth-child(6){animation-delay:.15s}.qc:nth-child(7){animation-delay:.18s}
.qc:nth-child(8){animation-delay:.21s}.qc:nth-child(9){animation-delay:.24s}.qc:nth-child(10){animation-delay:.27s}
.qc.ok{border-color:rgba(22,163,74,0.35);}
.qc.err{border-color:rgba(220,38,38,0.35);}

.qtop{padding:1.1rem 1.4rem .9rem;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start;}
.qnum{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(26,86,219,0.18);padding:3px 9px;border-radius:999px;white-space:nowrap;flex-shrink:0;margin-top:1px;}
.qtext{font-size:14px;line-height:1.65;color:var(--text);}

.qopts{padding:.85rem 1.4rem;display:flex;flex-direction:column;gap:7px;}
.opt{display:flex;align-items:flex-start;gap:10px;background:none;border:1px solid var(--border);border-radius:var(--r);padding:10px 13px;cursor:pointer;text-align:left;width:100%;font-family:'Inter',sans-serif;font-size:13.5px;color:var(--text2);line-height:1.5;transition:background .15s,border-color .15s,color .15s;}
.opt:hover:not(:disabled){background:var(--surface2);border-color:var(--border2);color:var(--text);}
.opt:disabled{cursor:default;}
.ol{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--text3);min-width:17px;flex-shrink:0;padding-top:1px;}
.oi{margin-left:auto;font-size:13px;flex-shrink:0;padding-top:1px;}
.opt.s-ok{background:var(--green-dim2);border-color:rgba(22,163,74,.4);color:var(--green);}
.opt.s-ok .ol{color:var(--green);}
.opt.s-err{background:var(--red-dim2);border-color:rgba(220,38,38,.4);color:var(--red);}
.opt.s-err .ol{color:var(--red);}
.opt.s-dim{opacity:.32;}

.qfb{display:none;padding:9px 1.4rem 13px;border-top:1px solid var(--border);font-size:12.5px;line-height:1.55;}
.qfb.on{display:block;animation:fi .22s ease;}
.qfb.ok{color:var(--green);}.qfb.err{color:var(--red);}
.qfb strong{font-weight:600;}

/* fonte do slide */
.slide-ref{font-family:'JetBrains Mono',monospace;font-size:10px;opacity:.55;display:block;margin-top:4px;}

@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}

.footer{text-align:center;padding:2.5rem 2rem;font-size:12px;color:var(--text3);}
@media(max-width:580px){.main{padding:1.1rem 1rem;}.qtop,.qopts,.qfb{padding-left:1rem;padding-right:1rem;}}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <h1>Quiz — Sistemas de Informação Geográfica 2</h1>
    <p id="hero-theme">Introdução ao SIG</p>
    <div class="hero-stats">
      <div><div class="h-stat-val">10</div><div class="h-stat-lbl">versões</div></div>
      <div><div class="h-stat-val">100</div><div class="h-stat-lbl">perguntas</div></div>
      <div><div class="h-stat-val">8</div><div class="h-stat-lbl">temas</div></div>
    </div>
  </div>
</div>

<div class="tabs"><div class="tabs-inner" id="tabs"></div></div>

<div class="sb">
  <div class="sb-inner">
    <div class="sb-chip"><div class="sb-dot g"></div><span>Certas: <strong id="c-ok">0</strong></span></div>
    <div class="sb-chip"><div class="sb-dot r"></div><span>Erradas: <strong id="c-err">0</strong></span></div>
    <div class="sb-chip"><div class="sb-dot w"></div><span>Por responder: <strong id="c-pend">10</strong></span></div>
    <div class="sb-prog">
      <div class="sb-lbl" id="sb-lbl">0 / 10</div>
      <div class="sb-track"><div class="sb-fill" id="sb-fill" style="width:0%"></div></div>
    </div>
    <button class="sb-reset" onclick="doReset()">↺ Reiniciar</button>
  </div>
</div>

<div class="main" id="main"></div>
<div class="footer">Quiz — Sistemas de Informação Geográfica 2</div>

<script>
// Fonte: slide indicado entre parêntesis em cada questão
const EXAMS = [

// ══════════════════════════════════════════════
// V1 — Introdução ao SIG (SIG_01 e SIG_02)
// ══════════════════════════════════════════════
{label:'V1 · Intro SIG', tema:'Introdução ao SIG', qs:[
{q:"Segundo Burrough (1986), um SIG é:",
 o:["Uma tecnologia que armazena, analisa e exibe dados espaciais e não espaciais",
    "Um poderoso conjunto de ferramentas para recolher, armazenar, recuperar, transformar e visualizar dados sobre o mundo real",
    "Um sistema que regista ocorrências de entidades materializáveis por pontos, linhas ou áreas",
    "Um conjunto de ferramentas que permite georreferenciar e extrair dados espaciais"],
 c:1, s:"SIG_01",
 e:"Burrough (1986): «Um poderoso conjunto de ferramentas para recolher, armazenar, recuperar, transformar e visualizar dados sobre o mundo real.»"},

{q:"Segundo Parker (1988), um SIG é:",
 o:["Um poderoso conjunto de ferramentas para recuperar e transformar dados do mundo real",
    "Um sistema que regista ocorrências de entidades materializáveis por pontos, linhas ou áreas",
    "Uma tecnologia de informação que armazena, analisa e exibe tanto dados espaciais como não espaciais",
    "Um conjunto de ferramentas para georreferenciar e visualizar dados espaciais"],
 c:2, s:"SIG_01",
 e:"Parker (1988): «Uma tecnologia de informação que armazena, analisa e exibe tanto dados espaciais como não espaciais.»"},

{q:"Segundo Dueker (1979), um SIG é um sistema cuja base de dados regista ocorrências de entidades materializáveis por:",
 o:["Pixéis, células e grelhas",
    "Pontos, linhas ou áreas",
    "Nós, arcos e polígonos topológicos",
    "Vetores, rasters e tabelas"],
 c:1, s:"SIG_01",
 e:"Dueker (1979): «Sistema cuja base de dados regista ocorrências de entidades, atividades ou eventos espacialmente distribuídos, materializáveis por pontos, linhas ou áreas.»"},

{q:"A Ciência da Informação Geográfica é definida na disciplina como:",
 o:["O conjunto de ferramentas que permite recolher, armazenar e visualizar dados espaciais",
    "A disciplina que toma o espaço geográfico por objeto de estudo",
    "O software utilizado para análise e produção de mapas",
    "O sistema de referência espacial utilizado no posicionamento de pontos"],
 c:1, s:"SIG_02",
 e:"«Ciência da Informação Geográfica — Disciplina que toma o espaço geográfico por objeto de estudo.»"},

{q:"Os Sistemas de Informação Geográfica são definidos como:",
 o:["Uma tecnologia que armazena, analisa e exibe dados espaciais e não espaciais",
    "Conjunto de ferramentas que permite recolher (georreferenciar), armazenar, extrair, transformar e visualizar dados espaciais",
    "Um poderoso conjunto de ferramentas para recuperar e transformar dados do mundo real",
    "Sistema cuja base de dados regista ocorrências materializáveis por pontos, linhas ou áreas"],
 c:1, s:"SIG_02",
 e:"SIG_02: «Sistemas de Informação Geográfica — Conjunto de ferramentas que permite recolher (georreferenciar), armazenar, extrair, transformar e visualizar dados espaciais.»"},

{q:"A modelação geográfica feita pelos SIG inclui (entre outros):",
 o:["Apenas cartografia temática e navegação",
    "Informação cadastral, infraestruturas, planeamento e gestão de recursos naturais, modelação espacial e temporal, visualização e navegação",
    "Apenas cálculo de rotas e inventariação de recursos",
    "Exclusivamente análise de risco e gestão de crises"],
 c:1, s:"SIG_02",
 e:"SIG_02: «Modelação geográfica, tendo em conta a informação cadastral, infraestruturas, planeamento e gestão de recursos naturais, modelação espacial e temporal, visualização de informação geográfica (ex: cartografia temática) e a navegação.»"},

{q:"O software QGIS pode ser descarregado em:",
 o:["esri.com","arcgis.com","qgis.org","geoportal.pt"],
 c:2, s:"SIG_01",
 e:"SIG_01: «Software a utilizar — Download em https://qgis.org/en/site/»"},

{q:"Qual das seguintes opções está listada na disciplina como importância do SIG na Proteção Civil?",
 o:["Substituir sistemas de comunicação de emergência",
    "Planear, inventariar, calcular rotas, usar cartas de risco e identificar áreas suscetíveis a fenómenos",
    "Gerir exclusivamente bases de dados alfanuméricas",
    "Produzir apenas cartografia para fins decorativos"],
 c:1, s:"SIG_01",
 e:"SIG_01 — Importância do SIG na Proteção Civil: Planear, Inventariar, Cálculo de Rotas, Instrumentos de gestão do território através das cartas de riscos, Identificar áreas suscetíveis a determinados fenómenos, Apoio à decisão."},

{q:"O QGIS foi iniciado em que ano e por quem?",
 o:["2010, pela ESRI","2005, pelo OGC","2002, por Gary Sherman","1998, pela Universidade de Minnesota"],
 c:2, s:"SIG_02",
 e:"SIG_02: «O QGIS foi iniciado em 2002 por Gary Sherman como um projeto de software livre e open source.»"},

{q:"O QGIS é descrito como uma alternativa gratuita a qual software?",
 o:["MapInfo","AutoCAD Map","Google Earth Pro","ArcGIS"],
 c:3, s:"SIG_02",
 e:"SIG_02: «Tornou-se rapidamente numa das principais alternativas gratuitas aos software SIG comerciais como o ArcGIS.»"}
]},

// ══════════════════════════════════════════════
// V2 — Cartografia (SIG_05, SIG_06)
// ══════════════════════════════════════════════
{label:'V2 · Cartografia', tema:'Cartografia', qs:[
{q:"A Cartografia é definida como:",
 o:["A ciência que trata da análise e exibição de dados espaciais",
    "A ciência que trata da conceção, produção, utilização e estudo documental dos mapas",
    "O conjunto de ferramentas para georreferenciar e armazenar dados",
    "A disciplina que toma o espaço geográfico por objeto de estudo"],
 c:1, s:"SIG_05",
 e:"SIG_05: «Cartografia é a ciência que trata da conceção, produção, utilização e estudo documental dos mapas.»"},

{q:"Qual a distinção entre 'Carta' e 'Mapa'?",
 o:["Carta tem maior escala; Mapa tem menor escala",
    "Carta é usada em cartografia topográfica e náutica; Mapa é a representação gráfica, a imagem/objeto",
    "Mapa inclui apenas altimetria; Carta inclui planimétria e altimetria",
    "Não existe diferença — são termos completamente sinónimos"],

{q:"Qual dos seguintes tipos de cartografia tem como objetivo «representar informação geográfica sobre um assunto específico»?",

 c:3, s:"SIG_05",
 e:"SIG_05: «Temática — objetivo é representar informação geográfica sobre um assunto específico. Tipicamente apresentam fenómenos localizáveis de qualquer natureza (o tema), sob forma qualitativa ou quantitativa.»"},

{q:"Qual dos seguintes tipos de cartografia representa «a topografia da superfície terrestre, tão fiel e pormenorizadamente quanto a escala o permite»?",
 o:["Hidrográfica","Base","Topográfica","Temática"],
 c:2, s:"SIG_05",
 e:"SIG_05: «Topográfica — Carta de base que representa, tão fiel e pormenorizadamente quanto a escala o permite, a topografia da superfície terrestre.» (GASPAR, 2004)"},

{q:"A escala numérica 1:1000 é referida como:",
 o:["Pequena escala, com menor relação com a realidade",
    "Grande escala, com grande relação com a realidade",
    "Escala média, sem distinção de grande ou pequena",
    "Escala standard para cartografia topográfica nacional"],
 c:1, s:"SIG_05",
 e:"SIG_05: «Grande escala, grande relação com a realidade (1:1000). Pequena escala, menor relação com a realidade 1:25000.»"},

{q:"Quais são os cinco elementos essenciais de um mapa, segundo a disciplina?",
 o:["Título, datum, escala, legenda e projeção",
    "Título, orientação, escala, legenda e fonte",
    "Título, orientação, coordenadas, legenda e autor",
    "Título, rosa dos ventos, escala, símbolos e datum"],
 c:1, s:"SIG_05",
 e:"SIG_05 — Elementos essenciais num mapa: Título, Orientação, Escala, Legenda e Fonte."},

{q:"A Orientação de um mapa serve para:",
 o:["Mostrar a relação de redução entre o mapa e a realidade",
    "Identificar os elementos presentes no mapa através de cor ou símbolo",
    "Indicar a posição geográfica do mapa, através da rosa dos ventos ou de um dos pontos cardinais",
    "Indicar o autor e a data de publicação do mapa"],
 c:2, s:"SIG_05",
 e:"SIG_05: «Orientação — Indica a posição geográfica do mapa, através da rosa dos ventos ou de um dos pontos cardinais.»"},

{q:"A Legenda de um mapa serve para:",
 o:["Indicar a posição geográfica através da rosa dos ventos",
    "Permitir identificar os elementos presentes no mapa, através de cor ou símbolo",
    "Mostrar a relação de redução entre o mapa e a realidade",
    "Indicar o sistema de projeção cartográfica utilizado"],
 c:1, s:"SIG_05",
 e:"SIG_05: «Legenda — Permite identificar os elementos nos elementos presentes no mapa, através de cor ou símbolo.»"},

{q:"A simbologia cartográfica é definida como a codificação dos dados que passam a símbolos gráficos, com o objetivo de:",
 o:["Aumentar o tamanho do ficheiro para maior qualidade",

 c:1, s:"SIG_06",
 e:"SIG_06 (adaptado de GASPAR, Joaquim Alves): A simbologia pode variar em Forma, Tamanho, Orientação «ângulo», Tonalidade, Cor, Trama, Croma ou intensidade/saturação e Textura ou grão."}
]},

// ══════════════════════════════════════════════

// ══════════════════════════════════════════════
{label:'V3 · Aquisição de Dados', tema:'Aquisição de Dados', qs:[
{q:"Quais são as duas grandes categorias de métodos de aquisição de dados para SIG?",

{q:"Quais dos seguintes são exemplos de métodos primários de aquisição de dados para SIG, segundo a disciplina?",

 c:2, s:"SIG_08",

{q:"Os levantamentos de campo incluem (entre outros):",

 c:1, s:"SIG_08",

{q:"A Fotogrametria como método de aquisição de dados inclui:",
 o:["GPS e fichas de levantamento de campo",

// ═══════════ ESTADO ═══════════
let cur = 0, ans = {};

function init(){
  const tc = document.getElementById('tabs');
  tc.innerHTML = EXAMS.map((e,i)=>`<button class="tab${i===0?' on':''}" onclick="go(${i})">${e.label}</button>`).join('');
  render();
}

function go(i){
  cur=i; ans={};
  document.querySelectorAll('.tab').forEach((b,j)=>b.classList.toggle('on',j===i));
  document.getElementById('hero-theme').textContent=EXAMS[i].tema;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function render(){
  const ex = EXAMS[cur];
  const m = document.getElementById('main');
  m.innerHTML='';

  // result card
  const rc=document.createElement('div');
  rc.className='result';rc.id='rc';
  rc.innerHTML=`<div class="res-num" id="rn">0<sub>/${ex.qs.length}</sub></div>
    <div class="res-sub">respostas corretas</div>
    <div class="res-track"><div class="res-bar" id="rb" style="width:0%"></div></div>
    <div class="res-pills"><span class="pill g" id="rg"></span><span class="pill r" id="rr"></span></div>
    <div class="res-msg" id="rm"></div>
    <button class="retry" onclick="doReset()">↺ Tentar novamente</button>`;
  m.appendChild(rc);

  ex.qs.forEach((q,qi)=>{
    const d=document.createElement('div');
    d.className='qc';d.id='qc'+qi;
    d.innerHTML=`<div class="qtop"><span class="qnum">Q ${qi+1}</span><span class="qtext">${q.q}</span></div>
      <div class="qopts">${q.o.map((o,oi)=>`
        <button class="opt" id="o${qi}_${oi}" onclick="pick(${qi},${oi})">
          <span class="ol">${String.fromCharCode(65+oi)}</span>
          <span style="flex:1">${o}</span>
          <span class="oi" id="oi${qi}_${oi}"></span>
        </button>`).join('')}</div>
      <div class="qfb" id="fb${qi}"></div>`;
    m.appendChild(d);
  });
  updateSB();
}

function pick(qi,oi){
  if(ans[qi]!==undefined)return;
  const ex=EXAMS[cur]; const q=ex.qs[qi];
  ans[qi]=oi;
  const ok=oi===q.c;
  q.o.forEach((_,i)=>{
    const b=document.getElementById(`o${qi}_${i}`);
    const ic=document.getElementById(`oi${qi}_${i}`);
    b.disabled=true;
    if(i===q.c){b.classList.add('s-ok');ic.textContent='✓';}
    else if(i===oi&&!ok){b.classList.add('s-err');ic.textContent='✗';}
    else b.classList.add('s-dim');
  });
  const fb=document.getElementById('fb'+qi);
  fb.className=`qfb on ${ok?'ok':'err'}`;
  fb.innerHTML=`<strong>${ok?'Correto!':'Incorreto.'}</strong> ${q.e}<span class="slide-ref">Fonte: ${q.s}</span>`;
  document.getElementById('qc'+qi).classList.add(ok?'ok':'err');
  updateSB(); checkEnd();
}

function updateSB(){
  const ex=EXAMS[cur]; const t=ex.qs.length;
  const done=Object.keys(ans).length;
  const ok=ex.qs.reduce((a,q,i)=>a+(ans[i]===q.c?1:0),0);
  document.getElementById('c-ok').textContent=ok;
  document.getElementById('c-err').textContent=done-ok;
  document.getElementById('c-pend').textContent=t-done;
  document.getElementById('sb-lbl').textContent=`${done} / ${t}`;
  document.getElementById('sb-fill').style.width=(done/t*100)+'%';
}

function checkEnd(){
  const ex=EXAMS[cur]; const t=ex.qs.length;
  if(Object.keys(ans).length<t)return;
  const ok=ex.qs.reduce((a,q,i)=>a+(ans[i]===q.c?1:0),0);
  const pct=Math.round(ok/t*100);
  const rc=document.getElementById('rc');
  rc.classList.add('on');
  document.getElementById('rn').innerHTML=`${ok}<sub>/${t}</sub>`;
  document.getElementById('rb').style.width=pct+'%';
  document.getElementById('rg').textContent=`✓ ${ok} certas`;
  document.getElementById('rr').textContent=`✗ ${t-ok} erradas`;
  let msg='';
  if(pct>=90)msg='Excelente! Dominaste este tema. Experimenta outra versão!';
  else if(pct>=70)msg='Bom resultado! Revê as perguntas onde erraste e tenta outra versão.';
  else if(pct>=50)msg='Resultado razoável. Volta a rever este tema antes de continuar.';
  else msg='Precisas de estudar mais este tema. Volta a estudar este tema com atenção.';
  document.getElementById('rm').textContent=msg;
  rc.scrollIntoView({behavior:'smooth',block:'start'});
}

function doReset(){ans={};render();window.scrollTo({top:0,behavior:'smooth'});}

init();
</script>
